services:
  db:
    image: postgres:15-alpine
    container_name: b2b_postgres_prod
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-b2b_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: b2b_redis_prod
    restart: always

  api:
    build: .
    container_name: b2b_api_prod
    restart: always
    ports:
      - "80:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-b2b_core}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  celery_worker:
    build: .
    container_name: b2b_celery_prod
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-b2b_core}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info

volumes:
  postgres_data: